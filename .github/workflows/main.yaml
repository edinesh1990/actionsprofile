#Github Actions workflow for CI/CD pipelines

name: CI/CD Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  workflow_dispatch:

  schedule:
    - cron: '0 0 * * 1-5' # Runs every weekday at 00:00 UTC

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      with:
        fetch-depth: 0
    - name: Run script
      run: |
        echo "Running CI/CD pipeline..."
    - name: Maven Build
      run: |
        mvn clean install
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: vprofile
        path: target/*.jar
    - name: Notify if Build Fails
      if: failure()
      run: |
        echo "Build failed! Please check the logs for details."

  Test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      with:
        fetch-depth: 0
    - name: Run tests
      if: github.ref == 'refs/heads/main'  
      run: |
        echo "Running tests..."
        mvn test
    - name: Checkstyle
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Running Checkstyle..."
        mvn checkstyle:checkstyle
    - name: Skipping tests for non-main branches
      if: github.ref != 'refs/heads/main'
      run: |
        echo "Skipping tests for non-main branch."

  Security-Scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      with:
        fetch-depth: 0
    - name: Run Trivy Security Scan
      if: github.ref == 'refs/heads/main'
      uses: aquasecurity/trivy-action@0.28.0
       with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'json'
        exit-code: '0'
        vulnerabilities-type: 'os,library'
        output: 'trivy-report.json'

    - name: Upload Trivy Report
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: trivy-scan-results
        path: trivy-report.json
       
    - name: Skipping security scan for non-main branches
      if: github.ref != 'refs/heads/main'
      run: |
        echo "Skipping security scan for non-main branch."